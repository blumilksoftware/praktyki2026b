openapi: 3.0.3
info:
  title: Applikuj API
  version: 1.0.1
  description: Applikuj REST API

servers:
  - url: /api

components:
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer

  schemas:
    User:
      $ref: "./components/schemas/User.yml"
    ValidationError:
      $ref: "./components/schemas/ValidationError.yml"

paths:
  /user:
    $ref: "./paths/user.yml"
  /register/company:
    $ref: "./paths/register_company.yml"
  /register/student:
    $ref: "./paths/register_student.yml"
  /email/verify/{id}/{token}:
    $ref: "./paths/email_verify.yml"
  /email/resend:
    $ref: "./paths/email_resend.yml"
