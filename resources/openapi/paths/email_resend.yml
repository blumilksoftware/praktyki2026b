post:
  summary: Resend email verification link
  operationId: resendVerificationEmail
  tags:
    - Auth
  servers:
    - url: /
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - email
          properties:
            email:
              type: string
              format: email
              example: user@example.com
  responses:
    "200":
      description: Verification link sent
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Verification link sent.
    "422":
      description: Validation errors
      content:
        application/json:
          schema:
            $ref: "../components/schemas/ValidationError.yml"
