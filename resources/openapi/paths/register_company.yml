post:
  summary: Register a new company account
  operationId: registerCompany
  tags:
    - Auth
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [company_name, nip, email, password, password_confirmation, street, building_number, postal_code, city, phone, terms]
          properties:
            company_name:
              type: string
              example: Acme Sp. z o.o.
            nip:
              type: string
              example: "1234563218"
            email:
              type: string
              format: email
              example: firma@example.com
            password:
              type: string
              format: password
              example: Password123!
            password_confirmation:
              type: string
              format: password
              example: Password123!
            street:
              type: string
              example: ul. Kwiatowa
            building_number:
              type: string
              example: "1"
            postal_code:
              type: string
              example: 00-001
            city:
              type: string
              example: Warszawa
            phone:
              type: string
              example: "123456789"
            website:
              type: string
              nullable: true
              example: https://acme.pl
            terms:
              type: boolean
              example: true
  responses:
    "201":
      description: Company registered successfully
      content:
        application/json:
          schema:
            $ref: "../components/schemas/User.yml"
    "422":
      description: Validation error
